<!DOCTYPE html>
<html>
<head>
    <title>Image Search</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="index.html">Google Search</a>
            <a href="advanced.html">Advanced Search</a>
        </div>

        <p class="logo">Image Search</p>

        <form action="https://google.com/search" method="GET" class="search-form">
            <input type="hidden" name="tbm" value="isch">
            
            <div class="search">
                <span class="search-icon material-symbols-outlined">search</span>
                <input class="search-input" type="search" placeholder="Search images" name="q" required>
            </div>

            <div class="button-row">
                <input class="lucky" type="submit" value="Search Images">
            </div>
        </form>
    </div>
</body>
</html>

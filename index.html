<!DOCTYPE html>
<html>
<head>
    <title>Google Search</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
</head>
<body>
    <div class="nav-bar">
        <a href="images.html">Image Search</a>
        <a href="advanced.html">Advanced Search</a>
    </div>

    <p class="logo">Google</p>

    <form action="https://www.google.com/search" class="search-form">
        <div class="search">
            <span class="search-icon material-symbols-outlined">search</span>
            <input class="search-input" type="search" placeholder="Search" name="q">
        </div>

        <div class="button-row">
            <input class="lucky" type="submit" name="btnI" value="I'm Feeling Lucky">
            <input class="gsearch" type="submit" name="btnK" value="Google Search">
        </div>
    </form>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Advanced Search</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="index.html">Google Search</a>
            <a href="images.html">Image Search</a>
        </div>

        <p class="logo">Advanced Search</p>

        <form class="advanced-form">
            <div class="advanced-field">
                <label for="query">Query</label>
                <input id="query" type="text" placeholder="Search terms">
            </div>
            <div class="advanced-field">
                <label for="site">Site</label>
                <input id="site" type="text" placeholder="example.com">
            </div>
            <div class="advanced-field">
                <label for="lang">Language</label>
                <input id="lang" type="text" placeholder="English">
            </div>
            <button class="advanced-submit" type="submit">Search</button>
        </form>
    </div>
</body>
</html>
